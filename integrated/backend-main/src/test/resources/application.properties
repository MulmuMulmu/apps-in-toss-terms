spring.application.name=graduation_project-test
spring.autoconfigure.exclude=com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration,com.google.cloud.spring.autoconfigure.storage.GcpStorageAutoConfiguration

spring.datasource.url=jdbc:h2:mem:mulmumulmu-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.type.preffered_uuid_jdbc_type=BINARY

jwt.secret=test-jwt-secret-test-jwt-secret-test-jwt-secret-test-jwt-secret
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=1209600000

kakao.api.key=test-kakao-local-rest-api-key

spring.cloud.gcp.storage.enabled=false
spring.cloud.gcp.core.enabled=false
spring.cloud.gcp.storage.project-id=test-project
spring.cloud.gcp.storage.bucket=test-bucket

app.cors.allowed-origin-patterns=http://localhost:8081,http://localhost:8082

ai.ocr.base-url=http://localhost:8000
ai.recommend.base-url=http://localhost:8002
ai.internal-token=
