spring.application.name=graduation_project-test
spring.autoconfigure.exclude=com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration,com.google.cloud.spring.autoconfigure.storage.GcpStorageAutoConfiguration

spring.datasource.url=${TEST_DB_URL:jdbc:mysql://localhost:3306/mulmumu_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${TEST_DB_USER:mulmumu}
spring.datasource.password=${TEST_DB_PASSWORD:mulmumu_pw}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=BINARY

jwt.secret=test-jwt-secret-test-jwt-secret-test-jwt-secret-test-jwt-secret
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=1209600000

kakao.api.key=test-kakao-local-rest-api-key

spring.cloud.gcp.storage.enabled=false
spring.cloud.gcp.core.enabled=false
spring.cloud.gcp.sql.enabled=false
spring.cloud.gcp.storage.project-id=test-project
spring.cloud.gcp.storage.bucket=test-bucket

app.cors.allowed-origin-patterns=http://localhost:8081,http://localhost:8082,http://localhost:5175,http://localhost:5176

ai.ocr.base-url=http://localhost:8000
ai.recommend.base-url=http://localhost:8002
ai.internal-token=
