spring.application.name=graduation_project-local
spring.autoconfigure.exclude=com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration,com.google.cloud.spring.autoconfigure.storage.GcpStorageAutoConfiguration

spring.datasource.url=${LOCAL_DB_URL:jdbc:mysql://localhost:3306/mulmumu_it?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${LOCAL_DB_USER:mulmumu}
spring.datasource.password=${LOCAL_DB_PASSWORD:mulmumu_pw}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=BINARY
spring.jpa.defer-datasource-initialization=true

jwt.secret=local-jwt-secret-local-jwt-secret-local-jwt-secret-local-jwt-secret
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=1209600000

kakao.api.key=${KAKAO_API_KEY:local-kakao-local-rest-api-key}

spring.cloud.gcp.storage.enabled=false
spring.cloud.gcp.core.enabled=false
spring.cloud.gcp.sql.enabled=false
spring.cloud.gcp.storage.project-id=local-project
spring.cloud.gcp.storage.bucket=local-bucket

app.cors.allowed-origin-patterns=http://localhost:4174,http://localhost:5173,http://localhost:5175,http://localhost:5176,http://localhost:8081,http://localhost:8082

ai.ocr.base-url=http://localhost:8000
ai.recommend.base-url=http://localhost:8002
ai.internal-token=
