spring.application.name=graduation_project

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=BINARY

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=1209600000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

kakao.api.key=${KAKAO_API_KEY}

spring.cloud.gcp.storage.project-id=${GCP_PROJECT_ID:project-5c4d1474-202b-4867-985}
spring.cloud.gcp.storage.bucket=${GCP_STORAGE_BUCKET:mulmumulmu_picture}

server.forward-headers-strategy=framework
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:8081,http://localhost:8082,http://localhost:5175,http://localhost:5176,https://mulmumu-frontend-aqjxa3obfa-du.a.run.app,https://mulmumu-admin-aqjxa3obfa-du.a.run.app}

ai.ocr.base-url=${AI_OCR_BASE_URL}
ai.recommend.base-url=${AI_RECOMMEND_BASE_URL}
ai.internal-token=${AI_INTERNAL_TOKEN:}

apps-in-toss.login.base-url=${APPS_IN_TOSS_LOGIN_BASE_URL:https://apps-in-toss-api.toss.im}
apps-in-toss.login.token-path=${APPS_IN_TOSS_TOKEN_PATH:/api-partner/v1/apps-in-toss/user/oauth2/generate-token}
apps-in-toss.login.user-info-path=${APPS_IN_TOSS_USER_INFO_PATH:/api-partner/v1/apps-in-toss/user/oauth2/login-me}
apps-in-toss.login.refresh-token-path=${APPS_IN_TOSS_REFRESH_TOKEN_PATH:/api-partner/v1/apps-in-toss/user/oauth2/refresh-token}
apps-in-toss.login.remove-by-user-key-path=${APPS_IN_TOSS_REMOVE_BY_USER_KEY_PATH:/api-partner/v1/apps-in-toss/user/oauth2/access/remove-by-user-key}
apps-in-toss.login.mtls.enabled=${APPS_IN_TOSS_MTLS_ENABLED:false}
apps-in-toss.login.mtls.cert-path=${APPS_IN_TOSS_MTLS_CERT_PATH:}
apps-in-toss.login.mtls.key-path=${APPS_IN_TOSS_MTLS_KEY_PATH:}
apps-in-toss.unlink-callback.basic-auth.enabled=${APPS_IN_TOSS_UNLINK_CALLBACK_BASIC_AUTH_ENABLED:false}
apps-in-toss.unlink-callback.basic-auth.username=${APPS_IN_TOSS_UNLINK_CALLBACK_BASIC_AUTH_USERNAME:}
apps-in-toss.unlink-callback.basic-auth.password=${APPS_IN_TOSS_UNLINK_CALLBACK_BASIC_AUTH_PASSWORD:}





