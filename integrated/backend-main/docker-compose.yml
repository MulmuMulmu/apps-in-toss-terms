services:
  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - app-network

  blue:
    build: .
    container_name: blue
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./gcp-key.json:/app/gcp-key.json
    env_file:
      - .env
    environment:
      - SERVER_PORT=8080
    networks:
      - app-network

  green:
    build: .
    container_name: green
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - ./gcp-key.json:/app/gcp-key.json
    environment:
      - SERVER_PORT=8081
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
